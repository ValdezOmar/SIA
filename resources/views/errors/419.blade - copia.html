<!DOCTYPE html>
<html lang="es" class="filament">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error 419 - Sesión expirada</title>
    
    <!-- Incluir estilos de Filament para consistencia -->
    @if(config('filament.dark_mode'))
        <style>
            :root { color-scheme: dark; }
        </style>
    @endif
    
    <script>
        let seconds = 10;
        function countdown() {
            const countdownElement = document.getElementById("countdown");
            if (!countdownElement) return;
            
            if (seconds <= 0) {
                // Usar la ruta de login de Filament por defecto
                window.location.href = "{{ filament()->getLoginUrl() }}";
            } else {
                countdownElement.innerText = seconds;
                seconds--;
                setTimeout(countdown, 1000);
            }
        }
        
        document.addEventListener('DOMContentLoaded', function() {
            countdown();
        });
    </script>
    
    <style>
        :root {
            --primary-50: 236 253 245;
            --primary-600: 5 150 105;
            --primary-700: 4 120 87;
            --gray-50: 249 250 251;
            --gray-100: 243 244 246;
            --gray-900: 17 24 39;
            --danger-400: 248 113 113;
        }
        
        .dark {
            --primary-50: 4 47 46;
            --primary-600: 20 184 166;
            --primary-700: 15 118 110;
            --gray-50: 31 41 55;
            --gray-100: 17 24 39;
            --gray-900: 243 244 246;
        }
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: 'Inter', ui-sans-serif, system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: rgb(var(--gray-50));
            color: rgb(var(--gray-900));
            position: relative;
            overflow: hidden;
            line-height: 1.5;
            transition: background-color 0.3s ease;
        }
        
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%239C92AC' fill-opacity='0.05'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            z-index: 0;
            opacity: 0.4;
        }
        
        .error-container {
            position: relative;
            z-index: 10;
            max-width: 28rem;
            width: 100%;
            padding: 2rem;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 1rem;
            box-shadow: 
                0 10px 25px -5px rgba(0, 0, 0, 0.1),
                0 10px 10px -5px rgba(0, 0, 0, 0.04),
                0 0 0 1px rgba(0, 0, 0, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            text-align: center;
        }
        
        .dark .error-container {
            background: rgba(31, 41, 55, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 
                0 10px 25px -5px rgba(0, 0, 0, 0.3),
                0 10px 10px -5px rgba(0, 0, 0, 0.2);
        }
        
        .error-code {
            font-size: 6rem;
            font-weight: 800;
            line-height: 1;
            color: rgb(var(--primary-600));
            margin-bottom: 0.5rem;
            letter-spacing: -0.025em;
        }
        
        .error-title {
            font-size: 1.5rem;
            font-weight: 600;
            color: rgb(var(--gray-900));
            margin-bottom: 0.5rem;
        }
        
        .error-message {
            color: rgb(107, 114, 128);
            margin-bottom: 1.5rem;
            font-size: 1.125rem;
        }
        
        .dark .error-message {
            color: rgb(156, 163, 175);
        }
        
        .error-icon {
            width: 5rem;
            height: 5rem;
            margin: 0 auto 1.5rem;
            color: rgb(var(--danger-400));
            opacity: 0.8;
        }
        
        .redirect-info {
            background: rgb(var(--primary-50));
            padding: 1rem;
            border-radius: 0.75rem;
            margin: 1.5rem 0;
            border-left: 4px solid rgb(var(--primary-600));
        }
        
        .dark .redirect-info {
            background: rgba(6, 78, 59, 0.3);
        }
        
        .countdown {
            font-weight: 700;
            color: rgb(var(--primary-700));
            font-size: 1.25rem;
        }
        
        .button-group {
            display: flex;
            gap: 0.75rem;
            justify-content: center;
            margin-top: 1.5rem;
        }
        
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.625rem 1.25rem;
            font-size: 0.875rem;
            font-weight: 500;
            border-radius: 0.5rem;
            text-decoration: none;
            transition: all 0.2s ease;
            border: 1px solid transparent;
            cursor: pointer;
        }
        
        .btn-primary {
            background: rgb(var(--primary-600));
            color: white;
        }
        
        .btn-primary:hover {
            background: rgb(var(--primary-700));
            transform: translateY(-1px);
        }
        
        .btn-outline {
            background: transparent;
            color: rgb(var(--primary-600));
            border-color: rgb(var(--primary-600));
        }
        
        .btn-outline:hover {
            background: rgb(var(--primary-50));
            transform: translateY(-1px);
        }
        
        .dark .btn-outline:hover {
            background: rgba(6, 78, 59, 0.3);
        }
        
        @media (max-width: 640px) {
            .error-container {
                margin: 1rem;
                padding: 1.5rem;
            }
            
            .error-code {
                font-size: 4rem;
            }
            
            .button-group {
                flex-direction: column;
            }
        }
        
        /* Evitar que aparezcan elementos de Filament detrás */
        body > :not(.error-container):not(script):not(style) {
            display: none !important;
        }
    </style>
</head>
<body class="{{ config('filament.dark_mode') ? 'dark' : '' }}">
    <div class="error-container">
        <svg class="error-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m0 0v2m0-2h2m-2 0H9m3-6a3 3 0 11-6 0 3 3 0 016 0zm-3-9v2m0 0v2m0-2h2m-2 0H9m12 0a9 9 0 11-18 0 9 9 0 0118 0z"></path>
        </svg>
        
        <h1 class="error-code">419</h1>
        <h2 class="error-title">Sesión Expirada</h2>
        <p class="error-message">
            Tu sesión ha expirado debido a inactividad o el token de seguridad ha caducado.
        </p>
        
        <div class="redirect-info">
            <p>Serás redirigido automáticamente en <span class="countdown" id="countdown">10</span> segundos...</p>
        </div>
        
        <div class="button-group">
            <a href="{{ filament()->getLoginUrl() }}" class="btn btn-primary">
                Iniciar Sesión
            </a>
            <a href="{{ url()->previous() }}" class="btn btn-outline" onclick="window.location.reload()">
                Recargar Página
            </a>
        </div>
    </div>
</body>
</html>
